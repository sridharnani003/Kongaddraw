; ============================================================================
; legacy-ddraw-compat Configuration
; ============================================================================
; DirectDraw compatibility layer for legacy Windows applications
; Place this file next to the application executable (with ddraw.dll)
;
; Values: true/false, yes/no, 1/0

[ddraw]
; Run in windowed mode (recommended for modern Windows)
windowed=true

; Maintain aspect ratio when scaling (black bars if needed)
maintas=true

; Use smooth scaling (bilinear-like filtering)
; Set to false for sharp pixel scaling
smooth=true

; Adjust mouse coordinates for scaled window
adjmouse=true

; Custom window size (0 = use application's resolution)
width=0
height=0

[compatibility]
; Fix surface pitch to 4-byte alignment
fixpitch=true

[debug]
; Enable debug logging (view with DebugView or debugger)
log=false
